name: Build Android app

# The native shell: the whole site rides INSIDE the app bundle
# (no website-in-a-box remote URL — stores reject those), data
# still flows live from Supabase. Produces an installable APK
# as a workflow artifact. Release signing arrives later as
# secrets; until then this builds the debug APK for testing.

on:
  workflow_dispatch: {}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Stage the site into the shell
        run: |
          mkdir -p www
          cp -r *.html css js data assets manifest.json sw.js www/
          # same stamping the Pages deploy does
          find www -maxdepth 1 \( -name '*.html' -o -name 'sw.js' \) \
            -exec sed -i "s/__STAMP__/${GITHUB_SHA::12}/g" {} +

      - name: Install Capacitor and add the Android platform
        run: |
          npm install
          npx cap add android
          npx cap sync android

      - name: Build the APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Ship the artifact
        uses: actions/upload-artifact@v4
        with:
          name: HERE-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
